name: AI Code Review

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - "app/**"
      - "routes/**"
      - "config/**"
      - "database/migrations/**"
      - "resources/views/**"

jobs:
  review:
    name: Larasense Limbo
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup larasense-limbo
        uses: Mattel-Limbo/larasense-limbo/action@master
        with:
          version: "0.5.7"

      - name: Verify secrets
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: |
          if [ -z "$AI_BASE_URL" ]; then
            echo "::error::AI_BASE_URL secret is empty or not set"
            exit 1
          fi
          if [ -z "$AI_API_KEY" ]; then
            echo "::error::AI_API_KEY secret is empty or not set"
            exit 1
          fi
          echo "AI_BASE_URL is set (${#AI_BASE_URL} chars)"
          echo "AI_API_KEY is set (${#AI_API_KEY} chars)"

      - name: Verify secrets
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: |
          if [ -z "$AI_BASE_URL" ]; then
            echo "::error::AI_BASE_URL secret is empty or not set (e.g., https://api.anthropic.com)"
            exit 1
          fi
          if [ -z "$AI_API_KEY" ]; then
            echo "::error::AI_API_KEY secret is empty or not set (e.g., XXXX-XXXXXXXXXXXXXXXX)"
            exit 1
          fi
          echo "AI_BASE_URL is set (${#AI_BASE_URL} chars)"
          echo "AI_API_KEY is set (${#AI_API_KEY} chars)"

      - name: Run AI Code Review
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          larasense-limbo analyze \
            --base origin/${{ github.base_ref }} \
            --head ${{ github.sha }} \
            --format github \
            --github-pr ${{ github.repository }}#${{ github.event.pull_request.number }}
